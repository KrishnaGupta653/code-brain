<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>code-brain graph</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>code-brain</h1>
        <p>Persistent, provenance-aware code graph</p>
      </div>

      <div class="panel">
        <label class="panel-label" for="searchInput">Search</label>
        <div class="search-row">
          <input id="searchInput" type="text" placeholder="File, symbol, route, config">
          <button id="searchBtn" type="button">Find</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>

      <div class="panel">
        <h2>Filters</h2>
        <div class="filter-group">
          <label class="filter-label">
            <input type="checkbox" id="filterFiles" checked> Files
          </label>
          <label class="filter-label">
            <input type="checkbox" id="filterClasses" checked> Classes
          </label>
          <label class="filter-label">
            <input type="checkbox" id="filterFunctions" checked> Functions
          </label>
          <label class="filter-label">
            <input type="checkbox" id="filterMethods" checked> Methods
          </label>
          <label class="filter-label">
            <input type="checkbox" id="filterRoutes" checked> Routes
          </label>
          <label class="filter-label">
            <input type="checkbox" id="filterTests" checked> Tests
          </label>
        </div>
        <div class="filter-group">
          <label class="filter-label">Edge Types:</label>
          <label class="filter-label">
            <input type="checkbox" id="filterImports" checked> Imports
          </label>
          <label class="filter-label">
            <input type="checkbox" id="filterCalls" checked> Calls
          </label>
          <label class="filter-label">
            <input type="checkbox" id="filterExtends" checked> Extends
          </label>
        </div>
        <button id="applyFiltersBtn" type="button">Apply Filters</button>
      </div>

      <div class="panel">
        <h2>Path Finder</h2>
        <p style="font-size: 12px; margin-bottom: 8px;">Shift+click two nodes to find path</p>
        <div id="pathInfo" style="font-size: 12px; margin-bottom: 8px; min-height: 40px;"></div>
        <div class="button-row">
          <button id="findPathBtn" type="button">Find Path</button>
          <button id="clearPathBtn" type="button">Clear Path</button>
        </div>
      </div>

      <div class="panel">
        <h2>Minimap</h2>
        <canvas id="minimapCanvas" style="width: 100%; border: 1px solid #ccc; border-radius: 4px;"></canvas>
      </div>

      <div class="panel">
        <div class="button-row">
          <button id="resetBtn" type="button">Reset</button>
          <button id="resetLayoutBtn" type="button">Reset layout</button>
          <button id="zoomInBtn" type="button">Zoom +</button>
          <button id="zoomOutBtn" type="button">Zoom -</button>
        </div>
        <div id="stats" class="stats"></div>
      </div>

      <div class="panel">
        <h2>Legend</h2>
        <div class="legend" id="legend"></div>
      </div>

      <div class="panel details" id="nodeInfo">
        <h2 id="nodeTitle">Select a node</h2>
        <div id="nodeDetails" class="node-details"></div>
        
        <!-- Code Viewer Section -->
        <div id="codeViewerSection" style="display: none; margin-top: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <h3 style="margin: 0; font-size: 0.95rem;">Source Code</h3>
            <button id="toggleCodeBtn" type="button" style="padding: 6px 12px; font-size: 0.85rem;">Hide Code</button>
          </div>
          <div id="codeViewer" class="code-viewer">
            <pre><code id="codeContent"></code></pre>
          </div>
        </div>
        
        <div id="nodeRelations" class="relations"></div>
      </div>
    </aside>

    <main class="canvas-shell">
      <canvas id="graphCanvas"></canvas>
    </main>
  </div>

  <script src="graph.js"></script>
</body>
</html>
